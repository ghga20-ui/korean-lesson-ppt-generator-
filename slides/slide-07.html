<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=720">
<title>Slide 07 — 기능 3: 주석 애니메이션</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 720px; height: 405px; overflow: hidden;
    font-family: 'Pretendard Variable', Pretendard, sans-serif;
    background: #FDFAF5;
    color: #1C1C1E;
    display: flex;
    align-items: center;
    padding: 0 56px;
    gap: 48px;
  }
  .left { flex: 1; }
  .feature-num {
    font-size: 12px;
    font-weight: 700;
    color: #2E5BE8;
    letter-spacing: 0.12em;
    margin-bottom: 12px;
  }
  h2 {
    font-size: 26px;
    font-weight: 700;
    color: #1B2A4A;
    line-height: 1.35;
    margin-bottom: 20px;
  }
  ul { list-style: none; display: flex; flex-direction: column; gap: 10px; }
  li {
    font-size: 14px;
    color: #3C3C3E;
    line-height: 1.5;
    display: flex;
    align-items: flex-start;
    gap: 8px;
  }
  .bullet { color: #2E5BE8; font-weight: 700; flex-shrink: 0; }

  /* 주석 타입 시각화 */
  .annotation-grid {
    width: 240px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .anno-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 12px 14px;
    background: #FFFFFF;
    border: 1px solid #E5E5EA;
  }
  .anno-icon {
    width: 36px;
    height: 24px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .icon-underline {
    width: 32px;
    height: 12px;
    border-bottom: 2.5px solid #E83030;
  }
  .icon-circle {
    width: 26px;
    height: 20px;
    border: 2px solid #E83030;
    border-radius: 50%;
  }
  .icon-rect {
    width: 32px;
    height: 18px;
    border: 2px solid #2E5BE8;
  }
  .anno-desc {
    flex: 1;
  }
  .anno-name {
    font-size: 13px;
    font-weight: 600;
    color: #1C1C1E;
  }
  .anno-sub {
    font-size: 11px;
    color: #6E6E73;
    line-height: 1.4;
  }
  .click-badge {
    margin-top: 14px;
    padding: 8px 12px;
    background: #EEF2FD;
    text-align: center;
  }
  .click-badge p {
    font-size: 12px;
    font-weight: 600;
    color: #2E5BE8;
  }
</style>
</head>
<body>
  <div class="left">
    <p class="feature-num">FEATURE 03</p>
    <h2>클릭 한 번으로<br>주석 순서 등장</h2>
    <ul>
      <li><span class="bullet">—</span><p>수업 중 클릭 시 주석이 순서대로 나타남</p></li>
      <li><span class="bullet">—</span><p>학생의 시선을 자연스럽게 유도</p></li>
      <li><span class="bullet">—</span><p>텍스트 상자와 도형을 조합해 설명 가능</p></li>
    </ul>
  </div>
  <div class="annotation-grid">
    <div class="anno-item">
      <div class="anno-icon"><div class="icon-underline"></div></div>
      <div class="anno-desc">
        <p class="anno-name">밑줄</p>
        <p class="anno-sub">핵심 어구 강조</p>
      </div>
    </div>
    <div class="anno-item">
      <div class="anno-icon"><div class="icon-circle"></div></div>
      <div class="anno-desc">
        <p class="anno-name">원형</p>
        <p class="anno-sub">단어·표현 집중 표시</p>
      </div>
    </div>
    <div class="anno-item">
      <div class="anno-icon"><div class="icon-rect"></div></div>
      <div class="anno-desc">
        <p class="anno-name">사각형</p>
        <p class="anno-sub">구절·단락 묶음 표시</p>
      </div>
    </div>
    <div class="click-badge">
      <p>클릭할 때마다 순서대로 등장</p>
    </div>
  </div>
</body>
</html>
