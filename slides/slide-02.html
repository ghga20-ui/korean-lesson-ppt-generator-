<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=720">
<title>Slide 02 — 공감</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 720px; height: 405px; overflow: hidden;
    font-family: 'Pretendard Variable', Pretendard, sans-serif;
    background: #FDFAF5;
    color: #1C1C1E;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 0 72px;
  }
  h2 {
    font-size: 28px;
    font-weight: 700;
    color: #1B2A4A;
    margin-bottom: 36px;
    line-height: 1.3;
  }
  ul {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 18px;
  }
  li {
    font-size: 17px;
    font-weight: 400;
    color: #1C1C1E;
    line-height: 1.5;
    display: flex;
    align-items: flex-start;
    gap: 12px;
  }
  .dot {
    width: 8px;
    height: 8px;
    background: #E83030;
    border-radius: 50%;
    flex-shrink: 0;
    margin-top: 7px;
  }
  .emphasis {
    font-weight: 700;
    color: #E83030;
  }
</style>
</head>
<body>
  <h2>이런 경험 있으신가요?</h2>
  <ul>
    <li>
      <div class="dot"></div>
      <p>시 한 편을 슬라이드로 옮기는 데 <span class="emphasis">30분~1시간</span>이 걸린다</p>
    </li>
    <li>
      <div class="dot"></div>
      <p>연 구분, 글자 크기, 줄 간격, 밑줄·동그라미 주석을 <span class="emphasis">매번 손으로</span> 맞춘다</p>
    </li>
    <li>
      <div class="dot"></div>
      <p>작품이 바뀌면 <span class="emphasis">처음부터 다시</span> 만들어야 한다</p>
    </li>
  </ul>
</body>
</html>
