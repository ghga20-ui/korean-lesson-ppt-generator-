<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=720">
<title>Slide 10 — 기술 배경</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 720px; height: 405px; overflow: hidden;
    font-family: 'Pretendard Variable', Pretendard, sans-serif;
    background: #FDFAF5;
    color: #1C1C1E;
    display: flex;
    align-items: center;
    padding: 0 56px;
    gap: 56px;
  }
  .left { flex: 1; }
  .label {
    font-size: 12px;
    font-weight: 600;
    color: #6E6E73;
    letter-spacing: 0.1em;
    margin-bottom: 12px;
  }
  h2 {
    font-size: 26px;
    font-weight: 700;
    color: #1B2A4A;
    line-height: 1.35;
    margin-bottom: 20px;
  }
  p.desc {
    font-size: 14px;
    color: #3C3C3E;
    line-height: 1.7;
  }
  p.desc em {
    font-style: normal;
    font-weight: 700;
    color: #2E5BE8;
  }
  .stack {
    display: flex;
    flex-direction: column;
    gap: 8px;
    flex-shrink: 0;
    width: 200px;
  }
  .stack-item {
    padding: 10px 16px;
    background: #FFFFFF;
    border: 1px solid #E5E5EA;
    border-left: 3px solid #2E5BE8;
    display: flex;
    flex-direction: column;
  }
  .stack-name {
    font-size: 13px;
    font-weight: 700;
    color: #1B2A4A;
  }
  .stack-role {
    font-size: 11px;
    color: #6E6E73;
    line-height: 1.4;
  }
</style>
</head>
<body>
  <div class="left">
    <p class="label">MADE BY A TEACHER</p>
    <h2>교사가 직접 만든<br>교사를 위한 도구</h2>
    <p class="desc">
      고교학점제 행정과 문학 수업을 <em>직접 담당하며</em><br>
      느낀 불편함에서 출발했습니다.<br>
      현장 경험이 설계의 기준입니다.
    </p>
  </div>
  <div class="stack">
    <div class="stack-item">
      <p class="stack-name">Next.js + Vercel</p>
      <p class="stack-role">웹앱 배포</p>
    </div>
    <div class="stack-item">
      <p class="stack-name">Gemini AI</p>
      <p class="stack-role">텍스트 처리 · 분석</p>
    </div>
    <div class="stack-item">
      <p class="stack-name">pptxgenjs</p>
      <p class="stack-role">PPT 생성 엔진</p>
    </div>
    <div class="stack-item">
      <p class="stack-name">브라우저 전용</p>
      <p class="stack-role">설치 불필요</p>
    </div>
  </div>
</body>
</html>
