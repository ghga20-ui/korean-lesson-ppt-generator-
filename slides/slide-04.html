<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=720">
<title>Slide 04 — 도구 소개</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 720px; height: 405px; overflow: hidden;
    font-family: 'Pretendard Variable', Pretendard, sans-serif;
    background: #1B2A4A;
    color: #FFFFFF;
    display: flex;
    align-items: center;
    padding: 0 72px;
    gap: 56px;
  }
  .left {
    flex: 1;
  }
  .label {
    font-size: 13px;
    font-weight: 600;
    color: #2E5BE8;
    letter-spacing: 0.1em;
    margin-bottom: 16px;
  }
  h2 {
    font-size: 34px;
    font-weight: 800;
    line-height: 1.3;
    color: #FFFFFF;
    margin-bottom: 20px;
  }
  p.desc {
    font-size: 15px;
    color: #A8BBD8;
    line-height: 1.6;
  }
  .right {
    flex-shrink: 0;
    width: 220px;
  }
  ul { list-style: none; display: flex; flex-direction: column; gap: 12px; }
  li {
    font-size: 14px;
    font-weight: 400;
    color: #D0DCF0;
    line-height: 1.5;
    display: flex;
    align-items: flex-start;
    gap: 10px;
  }
  .check {
    font-size: 14px;
    color: #2E5BE8;
    font-weight: 700;
    flex-shrink: 0;
  }
</style>
</head>
<body>
  <div class="left">
    <p class="label">SOLUTION</p>
    <h2>문학 수업<br>PPT 자동 생성기</h2>
    <p class="desc">웹 브라우저에서 작품 텍스트를 입력하면<br>수업에 바로 쓸 수 있는 .pptx 파일을 자동 생성합니다</p>
  </div>
  <div class="right">
    <ul>
      <li><span class="check">✓</span><p>별도 설치 없음</p></li>
      <li><span class="check">✓</span><p>인터넷만 있으면 사용 가능</p></li>
      <li><span class="check">✓</span><p>시 · 소설 모두 지원</p></li>
      <li><span class="check">✓</span><p>클릭 애니메이션 주석 자동 생성</p></li>
    </ul>
  </div>
</body>
</html>
