<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=720">
<title>Slide 12 — 마무리</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 720px; height: 405px; overflow: hidden;
    font-family: 'Pretendard Variable', Pretendard, sans-serif;
    background: #1B2A4A;
    color: #FFFFFF;
    display: flex;
    align-items: center;
    padding: 0 72px;
    gap: 56px;
  }
  .left { flex: 1; }
  .quote-mark {
    font-size: 52px;
    font-weight: 800;
    color: #2E5BE8;
    line-height: 1.2;
    margin-bottom: 6px;
  }
  h2 {
    font-size: 26px;
    font-weight: 700;
    color: #FFFFFF;
    line-height: 1.5;
    margin-bottom: 28px;
    letter-spacing: -0.01em;
  }
  p.closing {
    font-size: 14px;
    color: #A8BBD8;
    line-height: 1.6;
  }
  .right {
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }
  .qr-placeholder {
    width: 100px;
    height: 100px;
    border: 2px dashed #5F7FAA;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .qr-placeholder p {
    font-size: 10px;
    color: #5F7FAA;
    text-align: center;
    line-height: 1.4;
  }
  .qr-label {
    font-size: 12px;
    color: #A8BBD8;
    text-align: center;
  }
  .contact {
    font-size: 11px;
    color: #5F7FAA;
    text-align: center;
    line-height: 1.6;
  }
</style>
</head>
<body>
  <div class="left">
    <p class="quote-mark">"</p>
    <h2>교사의 에너지는<br>학생을 향해야 합니다</h2>
    <p class="closing">
      반복 노동에서 벗어나, 수업의 본질에<br>
      더 많은 시간을 쓸 수 있기를 바랍니다.<br><br>
      질문 · 사용 문의를 환영합니다.
    </p>
  </div>
  <div class="right">
    <div class="qr-placeholder">
      <p>QR<br>코드</p>
    </div>
    <p class="qr-label">서비스 링크</p>
    <p class="contact">문의 / 피드백 환영</p>
  </div>
</body>
</html>
