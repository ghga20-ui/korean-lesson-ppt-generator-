<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=720">
<title>Slide 06 — 기능 2: 소설 슬라이드</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 720px; height: 405px; overflow: hidden;
    font-family: 'Pretendard Variable', Pretendard, sans-serif;
    background: #FDFAF5;
    color: #1C1C1E;
    display: flex;
    align-items: center;
    padding: 0 56px;
    gap: 48px;
  }
  .left { flex: 1; }
  .feature-num {
    font-size: 12px;
    font-weight: 700;
    color: #2E5BE8;
    letter-spacing: 0.12em;
    margin-bottom: 12px;
  }
  h2 {
    font-size: 26px;
    font-weight: 700;
    color: #1B2A4A;
    line-height: 1.35;
    margin-bottom: 20px;
  }
  ul { list-style: none; display: flex; flex-direction: column; gap: 10px; }
  li {
    font-size: 14px;
    color: #3C3C3E;
    line-height: 1.5;
    display: flex;
    align-items: flex-start;
    gap: 8px;
  }
  .bullet { color: #2E5BE8; font-weight: 700; flex-shrink: 0; }

  /* 소설 미리보기 */
  .preview {
    width: 260px;
    height: 290px;
    background: #FFFFFF;
    border: 1px solid #E5E5EA;
    display: flex;
    flex-direction: column;
    padding: 20px 22px;
    flex-shrink: 0;
  }
  .preview-title {
    font-size: 10px;
    font-weight: 600;
    color: #6E6E73;
    margin-bottom: 14px;
    letter-spacing: 0.05em;
    text-align: center;
  }
  .novel-text {
    font-size: 11px;
    font-weight: 400;
    color: #1C1C1E;
    line-height: 1.85;
    letter-spacing: 0.01em;
  }
  .page-indicator {
    margin-top: auto;
    text-align: right;
    font-size: 9px;
    color: #A0A0A8;
  }
</style>
</head>
<body>
  <div class="left">
    <p class="feature-num">FEATURE 02</p>
    <h2>소설 — 슬라이드 용량 기준<br>자동 분할</h2>
    <ul>
      <li><span class="bullet">—</span><p>문단 단위가 아닌 글자 수 · 줄 수로 최적 분할</p></li>
      <li><span class="bullet">—</span><p>긴 인용문도 잘림 없이 자연스럽게 넘김</p></li>
      <li><span class="bullet">—</span><p>폰트 크기 · 줄 간격에 따라 분할 자동 재계산</p></li>
    </ul>
  </div>
  <div class="preview">
    <p class="preview-title">생성 슬라이드 예시</p>
    <p class="novel-text">
      명준은 창문 밖을 내다보았다. 거리에는<br>
      아무도 없었다. 그 고요함이 오히려 그를<br>
      불안하게 만들었다. 어디선가 발소리가<br>
      들려오는 것 같았지만, 그것도 이내<br>
      사라졌다.
    </p>
    <p class="page-indicator">2 / 5</p>
  </div>
</body>
</html>
