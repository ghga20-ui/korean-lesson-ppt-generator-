<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=720">
<title>Slide 01 — Cover</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 720px; height: 405px; overflow: hidden;
    font-family: 'Pretendard Variable', Pretendard, sans-serif;
    background: #1B2A4A;
    color: #FFFFFF;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 0 72px;
    position: relative;
  }
  .accent-line {
    width: 48px;
    height: 4px;
    background: #2E5BE8;
    margin-bottom: 24px;
  }
  h1 {
    font-size: 48px;
    font-weight: 800;
    line-height: 1.25;
    letter-spacing: -0.02em;
    margin-bottom: 16px;
    color: #FFFFFF;
  }
  p.subtitle {
    font-size: 18px;
    font-weight: 400;
    color: #A8BBD8;
    line-height: 1.5;
    margin-bottom: 0;
  }
  .presenter {
    position: absolute;
    bottom: 36px;
    left: 72px;
    font-size: 13px;
    color: #5F7FAA;
    font-weight: 400;
  }
  .badge {
    position: absolute;
    top: 36px;
    right: 72px;
    font-size: 12px;
    font-weight: 600;
    color: #2E5BE8;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
</style>
</head>
<body>
  <div class="accent-line"></div>
  <h1>AI로 만드는<br>문학 수업 PPT</h1>
  <p class="subtitle">수업 준비 시간을 절반으로 줄이는 자동화 도구</p>
  <p class="presenter">고등학교 국어과 교사 연수</p>
  <p class="badge">교사 제작 도구</p>
</body>
</html>
