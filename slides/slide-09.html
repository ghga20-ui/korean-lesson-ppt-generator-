<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=720">
<title>Slide 09 — 결과물 비교</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 720px; height: 405px; overflow: hidden;
    font-family: 'Pretendard Variable', Pretendard, sans-serif;
    background: #FDFAF5;
    color: #1C1C1E;
    display: flex;
    flex-direction: column;
    padding: 32px 56px;
  }
  h2 {
    font-size: 20px;
    font-weight: 700;
    color: #1B2A4A;
    margin-bottom: 24px;
    text-align: center;
  }
  .compare {
    flex: 1;
    display: flex;
    gap: 24px;
  }
  .col {
    flex: 1;
    display: flex;
    flex-direction: column;
  }
  .col-header {
    padding: 8px 14px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.06em;
    margin-bottom: 10px;
    text-align: center;
  }
  .col-header.before {
    background: #F5F5F7;
    color: #6E6E73;
  }
  .col-header.after {
    background: #2E5BE8;
    color: #FFFFFF;
  }
  .col-content {
    flex: 1;
    border: 1px solid #E5E5EA;
    background: #FFFFFF;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .col-content.after { border-color: #2E5BE8; }
  .row {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: #3C3C3E;
    line-height: 1.5;
    padding: 4px 0;
    border-bottom: 1px solid #F0F0F0;
  }
  .row:last-child { border-bottom: none; }
  .icon-x { color: #E83030; font-weight: 700; width: 14px; flex-shrink: 0; }
  .icon-o { color: #2E5BE8; font-weight: 700; width: 14px; flex-shrink: 0; }
  .vs {
    width: 32px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 700;
    color: #A0A8B8;
    align-self: stretch;
  }
</style>
</head>
<body>
  <h2>수작업 PPT vs. 자동 생성 PPT</h2>
  <div class="compare">
    <div class="col">
      <div class="col-header before">수작업</div>
      <div class="col-content">
        <div class="row"><span class="icon-x">✕</span><p>작품 한 편당 30분~1시간 소요</p></div>
        <div class="row"><span class="icon-x">✕</span><p>연 구분·간격 수동 조정</p></div>
        <div class="row"><span class="icon-x">✕</span><p>주석 도형 일일이 배치</p></div>
        <div class="row"><span class="icon-x">✕</span><p>작품 교체 시 처음부터 재작업</p></div>
      </div>
    </div>
    <div class="vs">VS</div>
    <div class="col">
      <div class="col-header after">자동 생성</div>
      <div class="col-content after">
        <div class="row"><span class="icon-o">✓</span><p>텍스트 입력 후 수 초 내 완성</p></div>
        <div class="row"><span class="icon-o">✓</span><p>연 분할·간격 자동 계산</p></div>
        <div class="row"><span class="icon-o">✓</span><p>주석 애니메이션 자동 삽입</p></div>
        <div class="row"><span class="icon-o">✓</span><p>작품만 바꿔 즉시 재생성</p></div>
      </div>
    </div>
  </div>
</body>
</html>
