<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=720">
<title>Slide 03 — 문제 정의</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 720px; height: 405px; overflow: hidden;
    font-family: 'Pretendard Variable', Pretendard, sans-serif;
    background: #FDFAF5;
    color: #1C1C1E;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 0 72px;
  }
  h2 {
    font-size: 15px;
    font-weight: 600;
    color: #6E6E73;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 32px;
  }
  .split {
    display: flex;
    gap: 40px;
    align-items: flex-start;
  }
  .col {
    flex: 1;
  }
  .col-title {
    font-size: 14px;
    font-weight: 600;
    color: #6E6E73;
    margin-bottom: 10px;
    padding-bottom: 8px;
    border-bottom: 2px solid #E5E5EA;
  }
  .col.should .col-title { border-color: #2E5BE8; color: #2E5BE8; }
  .col.actual .col-title { border-color: #E83030; color: #E83030; }
  ul { list-style: none; }
  li {
    font-size: 15px;
    font-weight: 400;
    color: #1C1C1E;
    line-height: 1.6;
    padding: 4px 0;
  }
  .divider {
    width: 1px;
    height: 100px;
    background: #E5E5EA;
    align-self: center;
  }
  .conclusion {
    margin-top: 32px;
    padding: 14px 20px;
    background: #EEF2FD;
    border-left: 3px solid #2E5BE8;
  }
  .conclusion p {
    font-size: 15px;
    font-weight: 500;
    color: #1B2A4A;
    line-height: 1.5;
  }
</style>
</head>
<body>
  <h2>문제 정의</h2>
  <div class="split">
    <div class="col should">
      <p class="col-title">교사가 써야 할 시간</p>
      <ul>
        <li>작품 해석 · 감상</li>
        <li>발문 구성</li>
        <li>학생 피드백</li>
      </ul>
    </div>
    <div class="divider"></div>
    <div class="col actual">
      <p class="col-title">실제로 쓰는 시간</p>
      <ul>
        <li>PPT 레이아웃 작업</li>
        <li>폰트 · 간격 조정</li>
        <li>주석 도형 배치</li>
      </ul>
    </div>
  </div>
  <div class="conclusion">
    <p>구조화 가능한 반복 작업은 자동화할 수 있다</p>
  </div>
</body>
</html>
